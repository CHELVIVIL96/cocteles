<html lang="es">

<head>

    <style>
        /* --- Configuración General --- */
        body {
            background-color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* --- Contenedor Principal (Panel Horizontal) --- */
        .app-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 800px;
            width: 100%;
        }

        /* --- Menú Lateral / Índice Clickeable --- */
        .sidebar-index {
            width: 220px;
            flex-shrink: 0;
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 2px solid #daa520;
        }

        .category-group {
            margin-bottom: 20px;
        }

        .category-group:last-child {
            margin-bottom: 0;
        }

        .category-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
        }

        .cocktail-item {
            font-size: 0.9rem;
            color: #ddd;
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 400;
        }

        .cocktail-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding-left: 14px;
        }

        .cocktail-item.active {
            font-weight: 700;
            color: #1a1a1a !important;
        }

        /* --- Contenedor de la Tarjeta --- */
        .card-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        /* --- Contenedor 3D Adaptable --- */
        .card-container {
            width: 100%;
            max-width: 460px;
            height: 310px;
            perspective: 1200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: left;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* --- Estilos de las Caras --- */
        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            box-sizing: border-box;
            padding: 20px;
            color: #ffffff;
            background-color: #1a1a1a;
            border: 4px solid #2ecc71;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            transition: border-color 0.4s ease;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #141414;
        }

        /* --- Encabezado --- */
        .card-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 6px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #2ecc71;
            font-weight: 700;
            transition: color 0.4s ease;
        }

        /* --- Fila del Título y la Barra --- */
        .title-bar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 0 10px 0;
            gap: 15px;
            /* SOLUCIÓN: Permite que los elementos bajen si chocan horizontalmente */
            flex-wrap: wrap; 
        }

        h2 {
            font-family: 'Rye', serif;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            /* Permitimos que ocupe el máximo espacio disponible antes de forzar el wrap de la barra */
            flex: 1 1 200px; 
            line-height: 1.1;
        }

        /* --- Barra de Sabor --- */
        .flavor-bar-container {
            display: flex;
            flex-direction: column;
            width: 40%;
            min-width: 140px; /* Asegura un tamaño mínimo legible cuando baja de línea */
            flex-shrink: 0;
            gap: 3px;
            font-size: 0.58rem;
            letter-spacing: 1px;
            color: #daa520;
            font-weight: 600;
            text-transform: uppercase;
            /* Margen automático a la derecha para que si baja, se alinee estéticamente */
            margin-left: auto; 
        }

        .flavor-bar-labels {
            display: flex;
            justify-content: space-between;
        }

        .flavor-bar {
            position: relative;
            height: 9px;
            border-radius: 4px;
            background: linear-gradient(to right,
                    #1a8c44 0%, #1a8c44 25%,
                    #7ca844 25%, #7ca844 50%,
                    #c8443e 50%, #c8443e 75%,
                    #6c246c 75%, #6c246c 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .flavor-bar-marker {
            position: absolute;
            top: -1px;
            left: 0;
            width: 6px;
            height: 9px;
            background-color: #ffd700;
            border: 1px solid #daa520;
            transform: translateX(-50%);
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 4px rgba(218, 165, 32, 0.8);
        }

        /* --- Información --- */
        .flavor-profile {
            font-size: 0.78rem;
            color: #ddd;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .flavor-profile strong,
        .column h3 {
            color: #2ecc71;
            font-weight: 700;
            transition: color 0.4s ease;
        }

        .history {
            font-size: 0.75rem;
            line-height: 1.4;
            color: #b3b3b3;
            text-align: justify;
            font-weight: 300;
            overflow-y: auto;
            padding-right: 6px;
        }

        /* --- Estilización personalizada del Scrollbar (Card Front & Back) --- */
        .history::-webkit-scrollbar,
        .back-content::-webkit-scrollbar {
            width: 5px;
        }

        .history::-webkit-scrollbar-track,
        .back-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .history::-webkit-scrollbar-thumb,
        .back-content::-webkit-scrollbar-thumb {
            background-color: var(--theme-color, #2ecc71);
            border-radius: 10px;
            opacity: 0.7;
        }

        .history::-webkit-scrollbar-thumb:hover,
        .back-content::-webkit-scrollbar-thumb:hover {
            filter: brightness(1.2);
        }

        /* Compatibilidad para Firefox */
        .history,
        .back-content {
            scrollbar-width: thin;
            scrollbar-color: var(--theme-color, #2ecc71) transparent;
        }

        /* --- Parte Trasera (2 columnas) --- */
        .back-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            flex-grow: 1;
            margin-top: 14px;
            font-size: 0.7rem;
            overflow-y: auto;
            padding-bottom: 25px;
        }

        .column h3 {
            font-size: 0.75rem;
            margin-top: 0;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
            letter-spacing: 1px;
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li {
            margin-bottom: 5px;
            color: #eee;
        }

        .column ul li span {
            display: block;
            color: #888;
            font-size: 0.65rem;
        }

        .instructions-list {
            padding-left: 12px;
            margin: 0;
            color: #eee;
        }

        .instructions-list li {
            margin-bottom: 5px;
            line-height: 1.2;
        }

        /* =========================================================
            RESPONSIVE - DISPOSITIVOS MÓVILES (PORTRAIT / VERTICAL)
        ========================================================= */
        @media (max-width: 700px) {
            .app-layout {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }

            .sidebar-index {
                width: 92vw;
                max-width: 460px;
                box-sizing: border-box;
                padding: 12px;
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: space-between;
            }

            .category-group {
                margin-bottom: 0;
            }

            .card-container {
                width: 92vw;
            }
        }

        /* =========================================================
            RESPONSIVE - CELULARES EN HORIZONTAL (LANDSCAPE)
        ========================================================= */
        @media (max-height: 500px) {
            body {
                padding: 10px;
            }

            .app-layout {
                gap: 20px;
            }

            .sidebar-index {
                width: 160px;
                padding: 12px;
            }

            .card-container {
                height: 200px;
                max-width: 520px;
            }

            .card-front,
            .card-back {
                padding: 12px;
                border-width: 3px;
            }

            .title-bar-row {
                margin: 6px 0 4px 0;
            }

            h2 {
                font-size: 1.4rem;
            }

            .flavor-profile {
                font-size: 0.7rem;
                margin-bottom: 5px;
            }

            .history {
                font-size: 0.68rem;
                line-height: 1.3;
            }

            .back-content {
                margin-top: 5px;
                gap: 10px;
                padding-bottom: 15px;
            }

            .column h3 {
                font-size: 0.7rem;
                margin-bottom: 3px;
            }

            .flavor-bar-container {
                font-size: 0.5rem;
            }
        }
    </style>
</head>

                    { name: "Soda", qty: "Hasta completar" },
                    { name: "Guarnición", qty: "Rodaja de limón y cereza" }
                ],
                instructions: [
                    "Agregue los ingredientes al shaker (excepto la soda).",
                    "Agregua hielo y mueve por 8-10 segundos.",
                    "Agregue hielo al vaso y sirva.",
                    "Complete con la soda.",
                    "Decore con la guarnición."
                ],
            }
        ];

        let currentIndex = 0;

        // 2. Generar el Índice del Menú Lateral
        function buildMenuIndex() {
            const sidebar = document.getElementById('sidebarIndex');
            sidebar.innerHTML = '';

            const categories = [...new Set(cocktailData.map(item => item.category))];

            categories.forEach(category => {
                const group = document.createElement('div');
                group.className = 'category-group';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = category;
                group.appendChild(title);

                cocktailData.forEach((cocktail, index) => {
                    if (cocktail.category === category) {
                        const item = document.createElement('div');
                        item.className = 'cocktail-item';
                        item.innerText = cocktail.name;
                        item.setAttribute('data-index', index);

                        item.addEventListener('click', (e) => {
                            cardContainer.classList.remove('is-flipped');
                            setTimeout(() => {
                                currentIndex = index;
                                renderCard(currentIndex);
                            }, 150);
                        });

                        group.appendChild(item);
                    }
                });

                sidebar.appendChild(group);
            });
        }

        // 3. Renderizador Dinámico de la Tarjeta
        function renderCard(index) {
            const data = cocktailData[index];
            const frontContainer = document.getElementById('cardFront');
            const backContainer = document.getElementById('cardBack');
            const sidebar = document.getElementById('sidebarIndex');

            // Asignar variable CSS dinámicamente para que la use el scrollbar en el CSS superior
            document.documentElement.style.setProperty('--theme-color', data.themeColor);

            sidebar.style.borderColor = data.themeColor;
            frontContainer.style.borderColor = data.themeColor;
            backContainer.style.borderColor = data.themeColor;

            // Render Frente
            frontContainer.innerHTML = `
                <div class="card-header" style="color: ${data.themeColor};">
                    <span>${data.id}</span>
                    <span>${data.category}</span>
                </div>
                <div class="title-bar-row">
                    <h2>${data.name}</h2>
                    <div class="flavor-bar-container">
                        <div class="flavor-bar-labels">
                            <span>Dulce</span>
                            <span>Amargo</span>
                        </div>
                        <div class="flavor-bar">
                            <div class="flavor-bar-marker" id="flavorMarker" style="left: 0%;"></div>
                        </div>
                    </div>
                </div>
                <div class="flavor-profile"><strong style="color: ${data.themeColor};">Perfil de Sabor:</strong> ${data.flavorProfile}</div>
                <div class="history"><strong>HISTORIA:</strong> ${data.history}</div>
            `;

            // Render Atrás
            const ingredientsHTML = data.ingredients.map(ing => `<li>${ing.name} <span>${ing.qty}</span></li>`).join('');
            const instructionsHTML = data.instructions.map(ins => `<li>${ins}</li>`).join('');

            backContainer.innerHTML = `
                <div class="card-header" style="color: ${data.themeColor};">
                    <span>${data.id} </span>
                    <span>${data.category}</span>
                </div>
                <div class="back-content">
                    <div class="column">
                        <h3 style="color: ${data.themeColor};">INGREDIENTES</h3>
                        <ul>${ingredientsHTML}</ul>
                    </div>
                    <div class="column">
                        <h3 style="color: ${data.themeColor};">INSTRUCCIONES</h3>
                        <ol class="instructions-list">${instructionsHTML}</ol>
                    </div>
                </div>
            `;

            // Actualizar clase activa del menú
            document.querySelectorAll('.cocktail-item').forEach(el => {
                const itemIndex = parseInt(el.getAttribute('data-index'));
                if (itemIndex === index) {
                    el.className = 'cocktail-item active';
                    el.style.backgroundColor = data.themeColor;
                } else {
                    el.className = 'cocktail-item';
                    el.style.backgroundColor = 'transparent';
                }
            });

            // Disparar la animación del marcador dorado con suavidad
            setTimeout(() => {
                const marker = document.getElementById('flavorMarker');
                if (marker) marker.style.left = `${data.flavorScore}%`;
            }, 60);
        }

        // 4. Animación Flip de la tarjeta
        const cardContainer = document.getElementById('cardContainer');
        cardContainer.addEventListener('click', () => {
            cardContainer.classList.toggle('is-flipped');
        });

        // Inicializar la app
        buildMenuIndex();
        renderCard(currentIndex);
    </script>
</body>

</html>
